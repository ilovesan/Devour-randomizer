<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>吞噬游玩随机结果生成器</title>
<style>
body{
text-align:center;
padding:30px;
font-size:18px;
/* 这里已经改成bg.jpg了 */
background: url("bg.jpg") no-repeat center center;
background-size: cover;
}
button{padding:12px 30px;font-size:18px;background:#222;color:#fff;border:none;border-radius:8px;cursor:pointer;}
.box{margin:20px auto;padding:20px;background:rgba(255,255,255,0.8);border-radius:10px;width:80%;}
</style>
</head>
<body>
<h2>吞噬游玩随机游玩结果</h2>
<button onclick="getResult()">一键生成游玩结果</button>
<div class="box" id="res"></div>

<script>
//A选项素材
let place = ["农舍","精神病院","小镇","居酒屋","屠宰场","庄园","嘉年华"];
let level = ["简单","普通","困难","梦魇"];
let hit = ["碰撞","不碰撞"];
let voice = ["接近语音","非接近语音"];

//B1-B4第一栏天赋
let t1 = ["无天赋1","急救先锋","攀爬行者","肾上腺素","后勤健将","急速","耐心","快工","无中生有","战地医生","领袖勋章","急行者","环保主义者","压力山大","超载模式","闪避达人"];
//B1-B4第二栏天赋
let t2 = ["无天赋2","钥匙守护者","千里眼","军需官","灵感","团队协作","退后","高超的洞悉力","抵抗","杀虫剂","完全充能","余震","已驯服","鹰眼捕手"];

function rnd(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function getResult(){
    let A1=rnd(place),A2=rnd(level),A3=rnd(hit),A4=rnd(voice);
    let A=`【A选项】${A1} · ${A2} · ${A3} · ${A4}`;

    function getB(){
        return `${rnd(t1)} + ${rnd(t2)}`;
    }
    let B1=getB(),B2=getB(),B3=getB(),B4=getB();
    let Ball=`
【B1】${B1}<br>
【B2】${B2}<br>
【B3】${B3}<br>
【B4】${B4}
`;
    document.getElementById("res").innerHTML=A+"<br><br>"+Ball;
}
</script>
</body>
</html>
